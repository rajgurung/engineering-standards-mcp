name: Release to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify standards files exist
        run: |
          for file in git-conventions code-review pr-standards staff-engineer-checklist testing-philosophy rails-standards frontend-standards deployment-standards; do
            if [ ! -s "build/standards/${file}.md" ]; then
              echo "ERROR: build/standards/${file}.md is missing or empty"
              exit 1
            fi
          done

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
